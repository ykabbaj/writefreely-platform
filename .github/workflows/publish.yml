name: Publish Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_latest:
        description: Publish the latest tag
        required: false
        default: true
        type: boolean

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/writefreely-platform

jobs:
  publish:
    name: Build, Test, Scan, And Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' || inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=WriteFreely Platform
            org.opencontainers.image.description=Source-built WriteFreely image for the WriteFreely Platform deployment

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/writefreely/Dockerfile
          load: true
          tags: writefreely-platform:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy OS package scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: writefreely-platform:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH

      - name: Run Trivy library scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: writefreely-platform:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library
          severity: CRITICAL,HIGH

      - name: Run smoke test
        run: make smoke-test
        env:
          WRITEFREELY_IMAGE: writefreely-platform:${{ github.sha }}

      - name: Run restore test
        run: make restore-test
        env:
          WRITEFREELY_IMAGE: writefreely-platform:${{ github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/writefreely/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
