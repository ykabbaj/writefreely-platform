name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compose-and-shell:
    name: Compose And Shell Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: |
          docker compose config
          docker compose -f docker-compose.yml -f docker-compose.release.yml config

      - name: Check shell scripts
        run: |
          sh -n docker/writefreely/entrypoint.sh
          sh -n scripts/init.sh
          sh -n scripts/backup.sh
          sh -n scripts/deploy.sh
          sh -n scripts/restore.sh
          sh -n scripts/restore-test.sh
          sh -n scripts/smoke-test.sh
          sh -n scripts/sync-backups.sh

      - name: Check Make targets render
        run: |
          make -n init
          make -n backup
          make -n restore BACKUP=backups/example
          make -n restore-test
          make -n deploy
          make -n ansible-collections
          make -n ansible-setup
          make -n release-check
          make -n dev-up
          make -n dev-backup
          make -n dev-restore BACKUP=backups/example
          make -n dev-restore-test
          make -n smoke-test
          make -n sync-backups BACKUP_REMOTE=example:writefreely

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
          additional_files: "docker/writefreely/entrypoint.sh"

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/writefreely/Dockerfile

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ".github/workflows ansible docker-compose.yml .markdownlint.yml .yamllint.yml .hadolint.yaml"

      - name: Run Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build WriteFreely image
        run: docker compose build writefreely

  smoke-test:
    name: Runtime Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start stack and verify HTTP response
        run: make dev-smoke-test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -f docker/writefreely/Dockerfile -t writefreely-platform:${{ github.sha }} .

      - name: Run Trivy OS package scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: writefreely-platform:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os
          severity: CRITICAL,HIGH

      - name: Run Trivy library scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: writefreely-platform:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library
          severity: CRITICAL,HIGH
