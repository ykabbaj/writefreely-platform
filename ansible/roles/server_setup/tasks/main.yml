---
- name: Validate supported operating system
  ansible.builtin.assert:
    that:
      - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "server_setup supports Debian/Ubuntu and RHEL-compatible hosts."

- name: Remove legacy Docker apt source files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.sources
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    - /etc/apt/sources.list.d/docker-ce.list
  when: ansible_os_family == "Debian"

- name: Remove Docker entries from main apt sources file
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: 'download\.docker\.com'
    state: absent
  when: ansible_os_family == "Debian"

- name: Install Debian packages
  ansible.builtin.apt:
    name: "{{ server_setup_debian_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Add Docker apt signing key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Detect Debian package architecture
  ansible.builtin.command: dpkg --print-architecture
  register: server_setup_dpkg_architecture
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Add Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/{{ ansible_distribution | lower }}
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Architectures: {{ server_setup_dpkg_architecture.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc
  register: server_setup_docker_repository
  when: ansible_os_family == "Debian"

- name: Install Docker packages from Docker apt repository
  ansible.builtin.apt:
    name: "{{ server_setup_docker_debian_packages }}"
    state: present
    update_cache: "{{ server_setup_docker_repository.changed }}"
  when: ansible_os_family == "Debian"

- name: Install RHEL-compatible packages
  ansible.builtin.dnf:
    name: "{{ server_setup_redhat_packages }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Create deployment directory
  ansible.builtin.file:
    path: "{{ server_setup_deploy_path }}"
    state: directory
    owner: "{{ server_setup_deploy_user }}"
    group: "{{ server_setup_deploy_user }}"
    mode: "0750"

- name: Create swap file
  ansible.builtin.command:
    cmd: "fallocate -l {{ server_setup_swap_size }} {{ server_setup_swap_file }}"
    creates: "{{ server_setup_swap_file }}"

- name: Secure swap file permissions
  ansible.builtin.file:
    path: "{{ server_setup_swap_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Check active swap files
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: server_setup_active_swap
  changed_when: false

- name: Format swap file
  ansible.builtin.command: "mkswap {{ server_setup_swap_file }}"
  when: "server_setup_swap_file not in server_setup_active_swap.stdout_lines"
  changed_when: true

- name: Enable swap
  ansible.builtin.command: "swapon {{ server_setup_swap_file }}"
  register: server_setup_swapon
  failed_when:
    - server_setup_swapon.rc != 0
    - "'Device or resource busy' not in server_setup_swapon.stderr"
  changed_when: server_setup_swapon.rc == 0
  when: "server_setup_swap_file not in server_setup_active_swap.stdout_lines"

- name: Persist swap mount
  ansible.builtin.mount:
    name: none
    src: "{{ server_setup_swap_file }}"
    fstype: swap
    opts: sw
    dump: 0
    passno: 0
    state: present

- name: Configure SSH hardening
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-writefreely-platform.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
  when: server_setup_enable_ssh_hardening
  notify: Restart ssh

- name: Configure kernel network hardening
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-writefreely-platform.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.secure_redirects = 0
      net.ipv4.conf.default.secure_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.default.accept_source_route = 0
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.icmp_ignore_bogus_error_responses = 1
      net.ipv4.tcp_syncookies = 1
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv6.conf.default.accept_redirects = 0
  when: server_setup_enable_sysctl_hardening
  notify: Reload sysctl

- name: Allow SSH with UFW
  community.general.ufw:
    rule: allow
    port: "{{ server_setup_ssh_port }}"
    proto: tcp
  when:
    - server_setup_enable_firewall
    - ansible_os_family == "Debian"

- name: Allow HTTP and HTTPS with UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "80", proto: tcp }
    - { port: "443", proto: tcp }
    - { port: "443", proto: udp }
  when:
    - server_setup_enable_firewall
    - ansible_os_family == "Debian"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny
  when:
    - server_setup_enable_firewall
    - ansible_os_family == "Debian"

- name: Enable firewalld
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  when:
    - server_setup_enable_firewall
    - ansible_os_family == "RedHat"

- name: Allow public services with firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - ssh
    - http
    - https
  when:
    - server_setup_enable_firewall
    - ansible_os_family == "RedHat"

- name: Enable fail2ban on Debian hosts
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
  when: ansible_os_family == "Debian"

- name: Enable unattended security upgrades on Debian hosts
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  when:
    - ansible_os_family == "Debian"
    - server_setup_enable_auto_updates
